  # ═══════════════════════════════════════════════════════════════════════════
  # DASHBOARD
  # ═══════════════════════════════════════════════════════════════════════════

  /dashboard/stats:
    get:
      tags: [Dashboard]
      operationId: getDashboardStats
      summary: Dashboard overview stats
      description: |
        Returns key metrics for the admin dashboard:
        - Today's check-ins and check-outs
        - Current occupancy rate
        - Upcoming bookings (next 7 days)
        - Pending bookings awaiting confirmation
        - Monthly revenue estimate
        - Unprocessed webhook count
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Dashboard statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/DashboardStats'
                required: [success, data]
        '401':
          $ref: '#/components/responses/Unauthorized'

  /dashboard/recent-bookings:
    get:
      tags: [Dashboard]
      operationId: getRecentBookings
      summary: Recent bookings for dashboard
      description: Returns the 10 most recently created bookings.
      security:
        - cookieAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 10
      responses:
        '200':
          description: Recent bookings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'
                required: [success, data]
        '401':
          $ref: '#/components/responses/Unauthorized'

  /dashboard/occupancy:
    get:
      tags: [Dashboard]
      operationId: getOccupancy
      summary: Room occupancy data
      description: |
        Returns daily occupancy data for all rooms in a date range.
        Used for calendar heatmap / occupancy chart on the dashboard.
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/DateFromParam'
        - $ref: '#/components/parameters/DateToParam'
      responses:
        '200':
          description: Occupancy data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/OccupancyEntry'
                required: [success, data]
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ═══════════════════════════════════════════════════════════════════════════
  # WEBHOOKS (Unified OTA Channel Manager)
  # ═══════════════════════════════════════════════════════════════════════════

  /webhooks/ingest:
    post:
      tags: [Webhooks]
      operationId: ingestWebhook
      summary: Receive OTA channel manager webhook
      description: |
        Unified webhook endpoint for receiving booking events from
        channel managers (e.g. SiteMinder, Cloudbeds) or direct OTA
        integrations (Agoda, Booking.com, Trip.com, etc.).

        A single endpoint handles all platforms — the `platform` field
        in the payload identifies the source.

        Events are logged and can be auto-processed or manually reviewed
        by the admin.

        **Authentication:** Requires the `X-Webhook-Key` header matching
        the configured WEBHOOK_API_KEY.
      security:
        - webhookApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookIngestRequest'
      responses:
        '200':
          description: Webhook received and logged
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      event_id:
                        type: integer
                        description: ID of the created webhook event log entry
                      status:
                        type: string
                        enum: [received, processed]
                    required: [event_id, status]
                required: [success, data]
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              example:
                success: false
                error:
                  code: AUTH_INVALID_CREDENTIALS
                  message: Webhook API key 無效
                  message_en: Invalid webhook API key
        '429':
          $ref: '#/components/responses/RateLimited'

  /webhooks/events:
    get:
      tags: [Webhooks]
      operationId: listWebhookEvents
      summary: List webhook event log
      description: |
        View all received webhook events with filtering.
        Admin only — used for debugging and audit.
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [received, processed, failed, ignored]
        - name: platform
          in: query
          schema:
            type: string
          description: Filter by source platform
        - name: event_type
          in: query
          schema:
            type: string
            enum: [new_booking, modify_booking, cancel_booking, rate_update, inventory_update, unknown]
      responses:
        '200':
          description: Webhook event list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WebhookEvent'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                required: [success, data, meta]
        '401':
          $ref: '#/components/responses/Unauthorized'

  /webhooks/events/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
        description: Webhook event ID

    get:
      tags: [Webhooks]
      operationId: getWebhookEvent
      summary: Get webhook event detail
      description: View full payload and processing status of a webhook event.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Webhook event detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/WebhookEvent'
                required: [success, data]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Webhooks]
      operationId: updateWebhookEventStatus
      summary: Update webhook event status
      description: |
        Manually mark a webhook event as processed, ignored, etc.
        Used by admin to manage unprocessed events.
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [processed, ignored, failed]
                error_message:
                  type: string
                  maxLength: 500
              required: [status]
      responses:
        '200':
          description: Event status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/WebhookEvent'
                required: [success, data]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'


  # ═══════════════════════════════════════════════════════════════════════════
  # LINE ADMIN BOT
  # ═══════════════════════════════════════════════════════════════════════════

  /line/admin/webhook:
    post:
      tags: [LINE Admin]
      operationId: receiveLineAdminWebhook
      summary: Receive LINE admin bot webhook
      description: |
        Validates `x-line-signature` against the exact raw body before JSON parsing.
        Supports LINE verification payloads with an empty `events` array.
        Only direct one-to-one user events are processed; group and room events are ignored.
      security:
        - lineSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                events:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
              required: [events]
      responses:
        '200':
          description: Webhook accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '401':
          description: Missing or invalid LINE signature

  /line/admin/binding-codes:
    post:
      tags: [LINE Admin]
      operationId: createLineBindingCode
      summary: Create one-time LINE admin binding code
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LineBindingCodeCreateRequest'
      responses:
        '201':
          description: Binding code created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/LineBindingCode'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /line/admin/admins:
    get:
      tags: [LINE Admin]
      operationId: listLineAdmins
      summary: List explicit LINE administrators
      security:
        - cookieAuth: []
      responses:
        '200':
          description: LINE administrator list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LineAdmin'
        '401':
          $ref: '#/components/responses/Unauthorized'


  /line/admin/notification-deliveries:
    get:
      tags: [LINE Admin]
      operationId: listNotificationDeliveries
      summary: Inspect notification delivery rows
      description: Authenticated admin endpoint for pending, retrying, failed, and sent LINE/email delivery records.
      security:
        - cookieAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, processing, retrying, sent, failed]
      responses:
        '200':
          description: Notification delivery list
        '401':
          $ref: '#/components/responses/Unauthorized'


  /line/admin/notification-deliveries/{id}/retry:
    put:
      tags: [LINE Admin]
      operationId: retryNotificationDelivery
      summary: Retry one notification delivery immediately
      security:
        - cookieAuth: []
          csrfToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Delivery queued for immediate retry
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /line/admin/audit-logs:
    get:
      tags: [LINE Admin]
      operationId: listLineAuditLogs
      summary: Inspect LINE administrator mutation audit logs
      security:
        - cookieAuth: []
      responses:
        '200':
          description: LINE audit log list
        '401':
          $ref: '#/components/responses/Unauthorized'

  /line/admin/admins/{id}/revoke:
    put:
      tags: [LINE Admin]
      operationId: revokeLineDeveloper
      summary: Revoke a developer LINE administrator
      description: Owner LINE access is protected and cannot be revoked by this endpoint.
      security:
        - cookieAuth: []
          csrfToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Developer access revoked
        '403':
          description: Owner access cannot be revoked here
        '404':
          $ref: '#/components/responses/NotFound'

  # ═══════════════════════════════════════════════════════════════════════════
  # SYSTEM
  # ═══════════════════════════════════════════════════════════════════════════

  /system/info:
    get:
      tags: [System]
      operationId: getSystemInfo
      summary: System information
      description: |
        Returns system info including versions, uptime, and service status.
        Admin only.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: System info
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/SystemInfo'
                required: [success, data]
        '401':
          $ref: '#/components/responses/Unauthorized'
